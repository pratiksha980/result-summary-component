<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="main-container">
      <article class="sub-container">
        <div class="result-container">
          <h3 class="result-title">Your Result</h3>
          <div class="marks">
            <h1>76</h1>
            <p>of 100</p>
          </div>

          <h2>Great</h2>
          <p>
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>
        <div class="summary-container">
          <h3 class="summary">Summary</h3>
          <div class="category">
            <div class="cat-name">
              <img src="./images/icon-reaction.svg" alt="reaction-icon" /><span
                class="reactn"
                >Reaction</span
              >
            </div>
            <div>
              <span><span class="no">80 </span>/ 100</span>
            </div>
          </div>

          <div class="category">
            <div class="cat-name">
              <img src="./images/icon-memory.svg" alt="memory-icon" /><span
                class="mem"
                >Memory</span
              >
            </div>
            <div>
              <span> <span class="no"> 92</span> / 100</span>
            </div>
          </div>
          <div class="category">
            <div class="cat-name">
              <img src="./images/icon-verbal.svg" alt="verbal-icon" /><span
                class="verbal"
                >Verbal</span
              >
            </div>
            <div>
              <span> <span class="no">61</span> / 100</span>
            </div>
          </div>

          <div class="category">
            <div class="cat-name">
              <img src="./images/icon-visual.svg" alt="visual-icon" />
              <span class="visual">Visual</span>
            </div>
            <div>
              <span><span class="no"> 72 </span>/ 100</span>
            </div>
          </div>

          <button>Continue</button>
        </div>
      </article>
    </main>
  </body>
</html>
